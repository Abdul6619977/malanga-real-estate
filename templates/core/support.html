{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="margin-top: 50px;">
    <h1 style="font-family:'Playfair Display', serif; text-align:center; margin-bottom: 10px;">Contact Support</h1>
    <p style="text-align:center; color:var(--text-secondary); margin-bottom:30px;">Have a problem or inquiry? Reach out to our admins.</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="user_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="user_email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Problem or Inquiry</label>
            <textarea name="issue_description" class="form-control" required></textarea>
        </div>
        <button type="submit" class="btn-primary btn-block">Send Support Ticket</button>
    </form>
</div>
{% endblock %}
