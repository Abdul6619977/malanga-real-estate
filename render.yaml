services:
  # ─── DATABASE (PostgreSQL) ──────────────────────────────────────────────────
  - type: db
    name: malanga-db
    databaseName: malanga_real_estate
    user: malanga_admin
    plan: free

  # ─── WEB SERVICE (Django) ──────────────────────────────────────────────────
  - type: web
    name: malanga-real-estate
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn --pythonpath . real_estate.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: malanga-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "malanga-real-estate.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
      # ─── Automatic Superuser Creation ──────────────────────────────────────
      - key: ADMIN_USERNAME
        sync: false
        placeholder: "Enter admin username"
      - key: ADMIN_PASSWORD
        sync: false
        placeholder: "Enter admin password"
      - key: ADMIN_EMAIL
        sync: false
        placeholder: "Enter admin email (optional)"
